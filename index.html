<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
html,body{background:#0d0d0d;color:#f2efe9;font-family:-apple-system,'Helvetica Neue',sans-serif;min-height:100%;padding-bottom:80px}

/* ── PAGES ── */
.page{display:none}.page.active{display:block}

/* ── TOP BAR ── */
.bar{background:#0d0d0d;border-bottom:1px solid #222;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.bar-t{font-size:17px;font-weight:700}
.bar-btn{background:none;border:none;font-family:inherit;font-size:15px;cursor:pointer;padding:8px 0;min-width:60px;color:#666}
.bar-btn.l{text-align:left}
.bar-btn.r{text-align:right;color:#ef4444}

/* ── HOME ── */
.home-top{padding:20px 18px 16px;border-bottom:1px solid #222}
.home-title{font-size:30px;font-weight:800;letter-spacing:-.5px}
.home-title em{color:#c9f23a;font-style:normal}
.home-meta{font-size:12px;font-family:'SF Mono',monospace;color:#555;margin-top:8px}
.stats{display:flex;gap:8px;margin-top:12px}
.stat{flex:1;background:#161616;border:1px solid #222;border-radius:12px;padding:12px 10px}
.stat-l{font-size:10px;font-family:'SF Mono',monospace;color:#3a3a3a;text-transform:uppercase;letter-spacing:.07em}
.stat-v{font-size:24px;font-weight:800;margin-top:2px}
.stat-v.g{color:#c9f23a}

/* ── DAY CARDS ── */
.days{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.dcard{background:#161616;border:1px solid #222;border-radius:16px;overflow:hidden}
.dcard.done{border-color:rgba(34,197,94,.5)}

.dcard-info{display:flex;align-items:center;gap:14px;padding:18px 18px 14px}
.dcolor{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:1px}
.dcolor.push{background:#ff6b35}.dcolor.pull{background:#38bdf8}.dcolor.legs{background:#a855f7}
.dtext{flex:1}
.dname{font-size:18px;font-weight:700;letter-spacing:-.3px}
.dtype{font-size:12px;color:#666;font-family:'SF Mono',monospace;margin-top:3px}
.dbadge{font-size:10px;font-family:'SF Mono',monospace;color:#22c55e;background:rgba(34,197,94,.13);padding:3px 8px;border-radius:5px}

/* BIG BUTTONS */
.dcard-btns{display:flex;gap:0;border-top:1px solid #222}
.dcard-btn{flex:1;padding:18px 14px;border:none;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.dcard-btn:active{filter:brightness(.85)}
.dcard-btn.start{background:#c9f23a;color:#0d0d0d;font-weight:700;font-size:16px}
.dcard-btn.hist{background:#1a1a1a;color:#666;font-size:14px;border-left:1px solid #222;max-width:130px}

/* ── SESSION ── */
.sess-head{padding:16px 18px 12px;border-bottom:1px solid #222}
.sess-tag{font-size:11px;font-family:'SF Mono',monospace;color:#3a3a3a;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.sess-title{font-size:24px;font-weight:800;letter-spacing:-.4px}
.sess-type{font-size:12px;color:#666;font-family:'SF Mono',monospace;margin-top:3px}

.exwrap{padding:12px 16px}

/* EX CARD */
.excard{background:#161616;border:1px solid #222;border-radius:16px;margin-bottom:10px;overflow:hidden}
.exhead{display:flex;align-items:center;padding:18px 16px;cursor:pointer;gap:12px}
.exhead:active{background:#1e1e1e}
.exhead-left{flex:1;min-width:0}
.exname{font-size:16px;font-weight:700;letter-spacing:-.2px;line-height:1.25}
.exsum{font-size:11px;font-family:'SF Mono',monospace;color:#666;margin-top:5px}
.etag{display:inline-block;font-size:9px;font-family:'SF Mono',monospace;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:4px;margin-left:8px;vertical-align:middle}
.etag.f{background:rgba(255,107,53,.18);color:#ff6b35}
.etag.k{background:rgba(168,85,247,.18);color:#a855f7}
.exhead-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.delbtn{background:none;border:none;font-size:22px;color:#333;cursor:pointer;padding:6px;line-height:1}
.delbtn:active{color:#ef4444}
.chevron{color:#333;font-size:12px;transition:transform .2s}
.excard.open .chevron{transform:rotate(180deg)}
.exbody{display:none;border-top:1px solid #222;padding:16px}
.excard.open .exbody{display:block}

/* REF */
.ref{background:#111;border:1px solid #222;border-radius:10px;padding:10px 14px;margin-bottom:14px}
.ref-lbl{font-size:9px;font-family:'SF Mono',monospace;color:#3a3a3a;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.ref-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.ref-ago{font-size:11px;font-family:'SF Mono',monospace;color:#3a3a3a}
.ref-val{font-size:12px;font-family:'SF Mono',monospace;color:#666}
.ref-val b{color:#c9f23a;font-weight:700}

/* SETS */
.sets-hdr{display:flex;gap:8px;margin-bottom:8px;padding:0 2px}
.sets-hdr-n{width:28px;font-size:10px;font-family:'SF Mono',monospace;color:#3a3a3a;text-align:center;flex-shrink:0;text-transform:uppercase}
.sets-hdr-c{flex:1;font-size:10px;font-family:'SF Mono',monospace;color:#3a3a3a;text-align:center;text-transform:uppercase}
.sets-hdr-x{width:52px;flex-shrink:0}
.setrow{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.setnum{width:28px;font-size:13px;font-family:'SF Mono',monospace;color:#444;text-align:center;flex-shrink:0}
.inp{flex:1;background:#111;border:1.5px solid #2a2a2a;border-radius:10px;padding:14px 4px;color:#f2efe9;font-family:'SF Mono',monospace;font-size:20px;font-weight:600;text-align:center;width:100%;-webkit-appearance:none}
.inp:focus{outline:none;border-color:#c9f23a;background:rgba(201,242,58,.06)}
.inp::placeholder{color:#333}
.ckbtn{width:52px;height:52px;border-radius:10px;background:#111;border:1.5px solid #2a2a2a;cursor:pointer;font-size:22px;color:#333;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ckbtn.on{background:rgba(201,242,58,.13);border-color:#c9f23a;color:#c9f23a}
.ckbtn:active{opacity:.6;transform:scale(.92)}

.add-set-btn{width:100%;padding:14px;border:1.5px dashed #2a2a2a;border-radius:10px;background:none;color:#555;font-family:'SF Mono',monospace;font-size:13px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;margin-top:4px}
.add-set-btn:active{background:#1a1a1a}

.note-field{width:100%;margin-top:10px;padding:12px;background:#111;border:1.5px solid #2a2a2a;border-radius:10px;color:#f2efe9;font-family:'SF Mono',monospace;font-size:13px;resize:none;line-height:1.5;-webkit-appearance:none}
.note-field:focus{outline:none;border-color:#c9f23a}
.note-field::placeholder{color:#333}

/* ADD EX */
.addex-card{background:#161616;border:1.5px dashed #2a2a2a;border-radius:16px;margin-bottom:10px;overflow:hidden}
.addex-head{padding:18px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.addex-head:active{background:#1e1e1e}
.addex-label{font-size:16px;font-weight:700;color:#c9f23a}
.addex-chev{color:#c9f23a;font-size:12px;transition:transform .2s}
.addex-card.open .addex-chev{transform:rotate(180deg)}
.addex-body{display:none;border-top:1px solid #222;padding:16px}
.addex-card.open .addex-body{display:block}
.addinp{width:100%;background:#111;border:1.5px solid #2a2a2a;border-radius:10px;padding:14px;color:#f2efe9;font-family:inherit;font-size:16px;-webkit-appearance:none;margin-bottom:10px}
.addinp:focus{outline:none;border-color:#c9f23a}
.addinp::placeholder{color:#333}
.tagrow{display:flex;gap:8px;margin-bottom:12px}
.tagbtn{flex:1;padding:12px 6px;border-radius:10px;border:1.5px solid #2a2a2a;background:#111;color:#555;font-family:'SF Mono',monospace;font-size:12px;text-align:center;cursor:pointer}
.tagbtn.on{border-color:#c9f23a;color:#c9f23a;background:rgba(201,242,58,.08)}
.tagbtn:active{opacity:.7}
.addconfirm{width:100%;padding:16px;background:#c9f23a;color:#0d0d0d;border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer}
.addconfirm:active{opacity:.85}

/* SAVE BAR */
.savebar{padding:14px 16px 20px}
.savebtn{width:100%;padding:20px;background:#c9f23a;color:#0d0d0d;border:none;border-radius:16px;font-family:inherit;font-size:18px;font-weight:800;cursor:pointer;letter-spacing:-.2px}
.savebtn:active{opacity:.85;transform:scale(.98)}

/* HISTORY */
.hist-head{padding:16px 18px 12px;border-bottom:1px solid #222}
.hist-title{font-size:22px;font-weight:800;letter-spacing:-.3px}
.hist-sub{font-size:12px;font-family:'SF Mono',monospace;color:#666;margin-top:3px}
.hist-tabs{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid #222;overflow-x:auto}
.hist-tabs::-webkit-scrollbar{display:none}
.htab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid #2a2a2a;background:none;color:#666;font-family:'SF Mono',monospace;font-size:12px;cursor:pointer;white-space:nowrap}
.htab.on{background:#f2efe9;color:#0d0d0d;border-color:transparent}
.histlist{padding:12px 16px}
.hblock{background:#161616;border:1px solid #222;border-radius:14px;margin-bottom:10px;overflow:hidden}
.hblock-date{padding:10px 16px;background:#1a1a1a;border-bottom:1px solid #222;font-size:11px;font-family:'SF Mono',monospace;color:#666}
.hex{padding:12px 16px;border-bottom:1px solid #222}
.hex:last-child{border-bottom:none}
.hex-name{font-size:14px;font-weight:700;margin-bottom:6px}
.hset{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.hset-n{font-size:10px;font-family:'SF Mono',monospace;color:#3a3a3a;min-width:22px}
.hset-v{font-size:13px;font-family:'SF Mono',monospace}
.hset-v .kg{color:#c9f23a;font-weight:700}
.hset-v .x{color:#3a3a3a;margin:0 3px}
.hset-v .ok{color:#22c55e;font-size:11px;margin-left:3px}
.hnote{font-size:11px;font-family:'SF Mono',monospace;color:#3a3a3a;margin-top:5px;font-style:italic}
.hempty{text-align:center;padding:40px 16px;font-family:'SF Mono',monospace;font-size:12px;color:#3a3a3a}

/* CHARTS */
.chart-head{padding:16px 18px 12px;border-bottom:1px solid #222}
.chart-title-main{font-size:22px;font-weight:800;letter-spacing:-.3px}
.chart-sub-main{font-size:12px;font-family:'SF Mono',monospace;color:#666;margin-top:3px}
.chart-day-tabs{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid #222;overflow-x:auto}
.chart-day-tabs::-webkit-scrollbar{display:none}
.cdtab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid #2a2a2a;background:none;color:#666;font-family:'SF Mono',monospace;font-size:12px;cursor:pointer;white-space:nowrap}
.cdtab.on{background:#c9f23a;color:#0d0d0d;border-color:transparent;font-weight:700}
.chart-ex-wrap{padding:12px 16px;border-bottom:1px solid #222}
.chart-sel{width:100%;background:#161616;border:1.5px solid #2a2a2a;border-radius:12px;padding:14px 16px;color:#f2efe9;font-family:inherit;font-size:16px;-webkit-appearance:none;cursor:pointer}
.chart-content{padding:14px 16px}
.chart-name{font-size:16px;font-weight:700;margin-bottom:3px}
.chart-nsub{font-size:11px;font-family:'SF Mono',monospace;color:#555;margin-bottom:14px}
.cstats{display:flex;gap:8px;margin-bottom:16px}
.cstat{flex:1;background:#161616;border:1px solid #222;border-radius:12px;padding:12px 10px}
.cstat-l{font-size:9px;font-family:'SF Mono',monospace;color:#3a3a3a;text-transform:uppercase;letter-spacing:.07em}
.cstat-v{font-size:20px;font-weight:800;margin-top:2px;color:#c9f23a}
.cstat-u{font-size:11px;color:#555}
.chart-box{background:#161616;border:1px solid #222;border-radius:14px;padding:16px 10px 12px;margin-bottom:14px;overflow:hidden}
canvas{display:block;width:100%!important}
.chart-leg{display:flex;gap:14px;margin-top:10px;padding:0 4px}
.leg-i{display:flex;align-items:center;gap:6px;font-size:10px;font-family:'SF Mono',monospace;color:#555}
.leg-dot{width:8px;height:8px;border-radius:50%}
.nodata{text-align:center;padding:40px 16px;font-family:'SF Mono',monospace;font-size:12px;color:#3a3a3a;line-height:1.8}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #222;display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-btn{flex:1;padding:12px 6px 10px;background:none;border:none;color:#444;font-family:inherit;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s}
.bnav-btn.on{color:#c9f23a}
.bnav-btn:active{opacity:.6}
.bnav-icon{font-size:24px;line-height:1}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#c9f23a;color:#0d0d0d;font-family:'SF Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:11px 22px;border-radius:30px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- HOME -->
<div class="page active" id="p-home">
  <div class="bar"><div class="bar-t">Training</div></div>
  <div class="home-top">
    <div class="home-title">5 jours<em>.</em></div>
    <div class="home-meta" id="hmeta">—</div>
    <div class="stats">
      <div class="stat"><div class="stat-l">Semaine</div><div class="stat-v g" id="sw">0/5</div></div>
      <div class="stat"><div class="stat-l">Total</div><div class="stat-v" id="st">0</div></div>
      <div class="stat"><div class="stat-l">Semaines</div><div class="stat-v" id="ss">0</div></div>
    </div>
  </div>
  <div class="days" id="days"></div>
</div>

<!-- SESSION -->
<div class="page" id="p-sess">
  <div class="bar">
    <button class="bar-btn l" onclick="goHome()">← Retour</button>
    <div class="bar-t" id="sbar-t"></div>
    <button class="bar-btn r" onclick="doClear()">Effacer</button>
  </div>
  <div class="sess-head">
    <div class="sess-tag" id="sess-tag"></div>
    <div class="sess-title" id="sess-title"></div>
    <div class="sess-type" id="sess-type"></div>
  </div>
  <div class="exwrap" id="exwrap"></div>
  <div class="savebar"><button class="savebtn" onclick="saveSess()">💾 Sauvegarder la séance</button></div>
</div>

<!-- HISTORY -->
<div class="page" id="p-hist">
  <div class="bar">
    <button class="bar-btn l" onclick="goHome()">← Retour</button>
    <div class="bar-t" id="hbar-t"></div>
    <div style="min-width:60px"></div>
  </div>
  <div class="hist-head">
    <div class="hist-title" id="htitle"></div>
    <div class="hist-sub" id="hsub"></div>
  </div>
  <div class="hist-tabs" id="htabs"></div>
  <div class="histlist" id="histlist"></div>
</div>

<!-- CHARTS -->
<div class="page" id="p-charts">
  <div class="bar"><div class="bar-t">Progression</div></div>
  <div class="chart-head">
    <div class="chart-title-main">Évolution des charges</div>
    <div class="chart-sub-main">Sélectionne un jour puis un exercice</div>
  </div>
  <div class="chart-day-tabs" id="cdtabs"></div>
  <div class="chart-ex-wrap">
    <select class="chart-sel" id="chart-sel" onchange="renderChart()">
      <option value="">— Choisir un exercice —</option>
    </select>
  </div>
  <div class="chart-content" id="chart-content"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <button class="bnav-btn on" id="bn-home" onclick="navTo('home')">
    <span class="bnav-icon">🏠</span><span>Accueil</span>
  </button>
  <button class="bnav-btn" id="bn-charts" onclick="navTo('charts')">
    <span class="bnav-icon">📈</span><span>Progression</span>
  </button>
</div>

<script>
/* ═══ STORAGE ═══ */
var KEY='trv6';
var DB={done:{},hist:{},plan:null};

function loadDB(){
  var raw=null;
  try{raw=localStorage.getItem(KEY);}catch(e){}
  if(!raw){try{raw=sessionStorage.getItem(KEY);}catch(e){}}
  if(!raw){try{var m=document.cookie.match(new RegExp('(?:^|; )'+KEY+'=([^;]*)'));if(m)raw=decodeURIComponent(m[1]);}catch(e){}}
  if(raw){try{DB=JSON.parse(raw);}catch(e){}}
  if(!DB.plan)DB.plan=JSON.parse(JSON.stringify(PLAN0));
}
function saveDB(){
  var raw=JSON.stringify(DB);
  try{localStorage.setItem(KEY,raw);}catch(e){}
  try{sessionStorage.setItem(KEY,raw);}catch(e){}
  try{var mini=JSON.stringify({done:DB.done,plan:DB.plan});if(mini.length<3800)document.cookie=KEY+'='+encodeURIComponent(mini)+';max-age=31536000;path=/;SameSite=Lax';}catch(e){}
  try{var r=indexedDB.open('TRdb',1);r.onupgradeneeded=function(e){e.target.result.createObjectStore('kv');};r.onsuccess=function(e){try{var tx=e.target.result.transaction('kv','readwrite');tx.objectStore('kv').put(raw,KEY);}catch(e){}};}catch(e){}
}

/* ═══ PLAN ═══ */
var PLAN0=[
  {id:0,day:'LUN',label:'Push',type:'pecs · épaules · triceps',color:'push',
   exos:[{n:'Développé couché haltères',t:'f'},{n:'Écarté poulie basse croisée',t:''},{n:'Développé militaire haltères assis',t:''},{n:'Élévations latérales haltères',t:''},{n:'Dips lestés',t:''},{n:'Extension triceps poulie haute',t:''}]},
  {id:1,day:'MAR',label:'Pull',type:'dos · biceps · épaules arrière',color:'pull',
   exos:[{n:'Tractions pronation lestées',t:'f'},{n:'Tirage horizontal poulie basse',t:''},{n:'Tirage nuque poulie haute',t:''},{n:'Oiseau haltères — rear delt',t:''},{n:'Curl haltères alterné',t:''},{n:'Curl marteau haltères',t:''}]},
  {id:2,day:'MER',label:'Legs',type:'quads · ischio · fessiers — LCA',color:'legs',
   exos:[{n:'Bulgarian split squat haltères',t:'k'},{n:'Leg extension machine',t:'k'},{n:'Romanian deadlift haltères',t:''},{n:'Fentes marchées haltères',t:'k'},{n:'Hip thrust barre',t:''},{n:'Mollets debout',t:''}]},
  {id:3,day:'JEU',label:'Push+',type:'pecs · épaules · triceps (variation)',color:'push',
   exos:[{n:'Développé incliné haltères',t:'f'},{n:'Pompes lestées',t:''},{n:'Arnold press haltères',t:''},{n:'Face pull à la poulie',t:''},{n:'Skull crusher EZ',t:''},{n:'Élévations frontales haltères',t:''}]},
  {id:4,day:'VEN',label:'Pull+',type:'dos · biceps · core',color:'pull',
   exos:[{n:'Soulevé de terre roumain barre',t:'f'},{n:'Tirage horizontal haltères',t:''},{n:'Tirage poulie haute prise large',t:''},{n:'Curl incliné haltères',t:''},{n:'Gainage obliques / Russian twist',t:''},{n:'Crunchs à la poulie',t:''}]}
];

/* ═══ HELPERS ═══ */
function wk(){var n=new Date(),j=new Date(n.getFullYear(),0,1),w=Math.ceil(((n-j)/864e5+j.getDay()+1)/7);return n.getFullYear()+'-W'+(w<10?'0'+w:w);}
function plan(){return DB.plan;}
function isDone(id){var w=wk();return !!(DB.done[w]&&DB.done[w][id]);}
function mkDone(id){var w=wk();if(!DB.done[w])DB.done[w]={};DB.done[w][id]=true;saveDB();}
function gH(id){return DB.hist[id]||[];}
function addH(id,e){if(!DB.hist[id])DB.hist[id]=[];DB.hist[id].unshift(e);if(DB.hist[id].length>20)DB.hist[id].pop();saveDB();}
function totS(){var t=0,p=plan();for(var i=0;i<p.length;i++)t+=gH(p[i].id).length;return t;}
function totW(){var s={},p=plan();for(var i=0;i<p.length;i++){var h=gH(p[i].id);for(var j=0;j<h.length;j++)s[h[j].w]=1;}return Object.keys(s).length;}

/* ═══ HOME ═══ */
var cur=0,ST={},newTag='';

function rHome(){
  var n=new Date(),w=wk();
  var D=['dim','lun','mar','mer','jeu','ven','sam'],M=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  document.getElementById('hmeta').textContent='Semaine '+w.split('-W')[1]+' · '+D[n.getDay()]+' '+n.getDate()+' '+M[n.getMonth()];
  var dc=0,p=plan();for(var i=0;i<p.length;i++)if(isDone(p[i].id))dc++;
  document.getElementById('sw').textContent=dc+'/5';
  document.getElementById('st').textContent=totS();
  document.getElementById('ss').textContent=totW();
  var wrap=document.getElementById('days');wrap.innerHTML='';
  for(var di=0;di<p.length;di++){(function(d){
    var done=isDone(d.id),hc=gH(d.id).length;
    var card=document.createElement('div');card.className='dcard'+(done?' done':'');
    // Info row
    var info=document.createElement('div');info.className='dcard-info';
    info.innerHTML='<div class="dcolor '+d.color+'"></div><div class="dtext"><div class="dname">'+d.day+' — '+d.label+'</div><div class="dtype">'+d.type+'</div></div>'+(done?'<div class="dbadge">✓ fait</div>':'');
    card.appendChild(info);
    // Buttons
    var btns=document.createElement('div');btns.className='dcard-btns';
    var sb=document.createElement('button');sb.className='dcard-btn start';
    sb.innerHTML='<span style="font-size:20px">▶</span> Démarrer';
    sb.onclick=(function(id){return function(){oSess(id);};})(d.id);
    btns.appendChild(sb);
    if(hc>0){
      var hb=document.createElement('button');hb.className='dcard-btn hist';
      hb.innerHTML='📋 Historique';
      hb.onclick=(function(id){return function(){oHist(id);};})(d.id);
      btns.appendChild(hb);
    }
    card.appendChild(btns);
    wrap.appendChild(card);
  })(p[di]);}
}

/* ═══ SESSION ═══ */
function oSess(dayId){
  cur=dayId;ST={};
  var p=plan(),d=p.filter(function(x){return x.id===dayId;})[0];
  document.getElementById('sbar-t').textContent=d.day+' · '+d.label;
  document.getElementById('sess-tag').textContent=d.day+' · séance';
  document.getElementById('sess-title').textContent=d.label;
  document.getElementById('sess-type').textContent=d.type;
  buildSess(d);showPage('p-sess');window.scrollTo(0,0);
}

function buildSess(d){
  var w=document.getElementById('exwrap');w.innerHTML='';
  for(var ei=0;ei<d.exos.length;ei++){(function(ei){buildExCard(d,ei,w);})(ei);}
  buildAddPanel(w,d);
}

function buildExCard(d,ei,wrap){
  var ex=d.exos[ei],h=gH(d.id),lastEx=null,prevEx=null;
  if(h[0]&&h[0].exos)for(var x=0;x<h[0].exos.length;x++){if(h[0].exos[x].name===ex.n){lastEx=h[0].exos[x];break;}}
  if(h[1]&&h[1].exos)for(var x=0;x<h[1].exos.length;x++){if(h[1].exos[x].name===ex.n){prevEx=h[1].exos[x];break;}}
  var rows=lastEx&&lastEx.sets&&lastEx.sets.length?lastEx.sets.map(function(s){return{kg:s.kg||'',reps:s.reps||'',done:false};}): [{kg:'',reps:'',done:false},{kg:'',reps:'',done:false}];
  if(rows.length<2)rows.push({kg:'',reps:'',done:false});
  ST[ei]={rows:rows,note:''};
  function fmt(e){if(!e||!e.sets)return'—';var r=e.sets.filter(function(s){return s.kg||s.reps;}).map(function(s){return'<b>'+(s.kg||'—')+'kg</b>×'+(s.reps||'—');}).join(' / ');return r||'—';}
  var refH='';
  if(lastEx||prevEx){
    refH='<div class="ref"><div class="ref-lbl">Référence charges</div>';
    if(lastEx)refH+='<div class="ref-row"><span class="ref-ago">Dernière · '+(lastEx.date||'')+'</span><span class="ref-val">'+fmt(lastEx)+'</span></div>';
    if(prevEx)refH+='<div class="ref-row"><span class="ref-ago">Avant · '+(prevEx.date||'')+'</span><span class="ref-val">'+fmt(prevEx)+'</span></div>';
    refH+='</div>';
  }
  var tH=ex.t==='f'?'<span class="etag f">priorité</span>':ex.t==='k'?'<span class="etag k">genoux</span>':'';
  var card=document.createElement('div');card.className='excard';card.id='ec'+ei;
  card.innerHTML=
    '<div class="exhead" id="eh'+ei+'">'+
      '<div class="exhead-left"><div class="exname">'+ex.n+tH+'</div><div class="exsum" id="es'+ei+'">2 séries effectives</div></div>'+
      '<div class="exhead-right"><button class="delbtn" id="db'+ei+'">✕</button><div class="chevron">▼</div></div>'+
    '</div>'+
    '<div class="exbody">'+refH+
      '<div class="sets-hdr"><div class="sets-hdr-n">#</div><div class="sets-hdr-c">kg</div><div class="sets-hdr-c">reps</div><div class="sets-hdr-x"></div></div>'+
      '<div id="sr'+ei+'"></div>'+
      '<button class="add-set-btn" id="as'+ei+'">+ Ajouter une série</button>'+
      '<textarea class="note-field" rows="2" placeholder="Notes (ressenti, technique...)" id="nf'+ei+'"></textarea>'+
    '</div>';
  wrap.appendChild(card);
  document.getElementById('eh'+ei).onclick=function(e){if(e.target.id==='db'+ei||e.target.closest&&e.target.closest('#db'+ei))return;card.classList.toggle('open');};
  document.getElementById('db'+ei).onclick=function(e){e.stopPropagation();delEx(d,ei);};
  document.getElementById('as'+ei).onclick=function(){ST[ei].rows.push({kg:'',reps:'',done:false});bRows(ei);};
  document.getElementById('nf'+ei).addEventListener('input',function(){ST[ei].note=this.value;});
  bRows(ei);
}

function buildAddPanel(wrap,d){
  newTag='';
  var p=document.createElement('div');p.className='addex-card';p.id='addpanel';
  p.innerHTML=
    '<div class="addex-head" id="addhead"><div class="addex-label">+ Ajouter un exercice</div><div class="addex-chev">▼</div></div>'+
    '<div class="addex-body">'+
      '<input class="addinp" type="text" placeholder="Nom de l\'exercice..." id="newname">'+
      '<div class="tagrow">'+
        '<button class="tagbtn on" id="tg0" onclick="setTag(\'\')">Aucun</button>'+
        '<button class="tagbtn" id="tg1" onclick="setTag(\'f\')">⭐ Priorité</button>'+
        '<button class="tagbtn" id="tg2" onclick="setTag(\'k\')">🦵 Genoux</button>'+
      '</div>'+
      '<button class="addconfirm" onclick="confirmAdd()">Ajouter</button>'+
    '</div>';
  wrap.appendChild(p);
  document.getElementById('addhead').onclick=function(){p.classList.toggle('open');};
}

function setTag(t){
  newTag=t;
  document.getElementById('tg0').className='tagbtn'+(t===''?' on':'');
  document.getElementById('tg1').className='tagbtn'+(t==='f'?' on':'');
  document.getElementById('tg2').className='tagbtn'+(t==='k'?' on':'');
}

function confirmAdd(){
  var name=document.getElementById('newname').value.trim();
  if(!name){toast('Entre un nom !');return;}
  var p=plan(),d=p.filter(function(x){return x.id===cur;})[0];
  d.exos.push({n:name,t:newTag});saveDB();buildSess(d);toast('Exercice ajouté ✓');
}

function delEx(d,ei){
  if(!confirm('Supprimer "'+d.exos[ei].n+'" ?'))return;
  d.exos.splice(ei,1);
  var ns={},keys=Object.keys(ST).map(Number).sort(function(a,b){return a-b;}),ni=0;
  for(var i=0;i<keys.length;i++){if(keys[i]===ei)continue;ns[ni]=ST[keys[i]];ni++;}
  ST=ns;saveDB();buildSess(d);toast('Supprimé');
}

function bRows(ei){
  var c=document.getElementById('sr'+ei);if(!c)return;c.innerHTML='';
  var rows=ST[ei].rows;
  for(var si=0;si<rows.length;si++){(function(si){
    var r=rows[si],div=document.createElement('div');div.className='setrow';
    div.innerHTML='<div class="setnum">'+(si+1)+'</div>'+
      '<input class="inp" type="number" inputmode="decimal" placeholder="—" value="'+(r.kg||'')+'" id="k'+ei+'_'+si+'">'+
      '<input class="inp" type="number" inputmode="numeric" placeholder="—" value="'+(r.reps||'')+'" id="r'+ei+'_'+si+'">'+
      '<button class="ckbtn'+(r.done?' on':'')+'" id="ck'+ei+'_'+si+'">✓</button>';
    c.appendChild(div);
    document.getElementById('k'+ei+'_'+si).addEventListener('input',function(){ST[ei].rows[si].kg=this.value;uSum(ei);});
    document.getElementById('r'+ei+'_'+si).addEventListener('input',function(){ST[ei].rows[si].reps=this.value;uSum(ei);});
    document.getElementById('ck'+ei+'_'+si).onclick=function(){ST[ei].rows[si].done=!ST[ei].rows[si].done;this.classList.toggle('on',ST[ei].rows[si].done);uSum(ei);};
  })(si);}
  uSum(ei);
}

function uSum(ei){
  var rows=ST[ei].rows,f=rows.filter(function(r){return r.kg||r.reps;}),dn=rows.filter(function(r){return r.done;}).length;
  var t=rows.length+' série'+(rows.length>1?'s':'');
  if(f[0]){if(f[0].kg)t+=' · '+f[0].kg+'kg';if(f[0].reps)t+=' ×'+f[0].reps;}
  if(f[1]&&f[1].kg&&f[1].kg!=(f[0]?f[0].kg:''))t+=' / '+f[1].kg+'kg';
  if(dn)t+=' · '+dn+'✓';
  var el=document.getElementById('es'+ei);if(el)el.textContent=t;
}

function saveSess(){
  var p=plan(),d=p.filter(function(x){return x.id===cur;})[0];
  var n=new Date(),M=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  var dt=n.getDate()+' '+M[n.getMonth()],w=wk();
  var exArr=[];
  for(var ei=0;ei<d.exos.length;ei++){
    if(!ST[ei])continue;
    exArr.push({name:d.exos[ei].n,date:dt,sets:ST[ei].rows.map(function(r){return{kg:r.kg,reps:r.reps,done:r.done};}),note:ST[ei].note});
  }
  addH(cur,{date:dt,w:w,exos:exArr});mkDone(cur);
  toast('Séance sauvegardée ✓');setTimeout(function(){rHome();showPage('p-home');},800);
}

function doClear(){if(confirm('Effacer les données ?'))oSess(cur);}

/* ═══ HISTORY ═══ */
var hD=0,hF='all';
function oHist(id){
  hD=id;hF='all';
  var p=plan(),d=p.filter(function(x){return x.id===id;})[0],h=gH(id);
  document.getElementById('hbar-t').textContent=d.day+' · '+d.label;
  document.getElementById('htitle').textContent=d.label+' — Historique';
  document.getElementById('hsub').textContent=d.type+' · '+h.length+' séance'+(h.length>1?'s':'');
  bHTabs(h);rHist();showPage('p-hist');window.scrollTo(0,0);
}
function bHTabs(h){
  var tabs=document.getElementById('htabs');tabs.innerHTML='';
  var wks=[],seen={};for(var i=0;i<h.length;i++){if(!seen[h[i].w]){seen[h[i].w]=1;wks.push(h[i].w);}}
  function mk(l,f){var b=document.createElement('button');b.className='htab'+(hF===f?' on':'');b.textContent=l;b.onclick=(function(ff,bb){return function(){hF=ff;document.querySelectorAll('.htab').forEach(function(x){x.classList.remove('on');});bb.classList.add('on');rHist();};})(f,b);tabs.appendChild(b);}
  mk('Tout','all');for(var i=0;i<Math.min(wks.length,8);i++)mk('S'+wks[i].split('-W')[1],wks[i]);
}
function rHist(){
  var h=gH(hD),fil=hF==='all'?h:h.filter(function(e){return e.w===hF;});
  var cont=document.getElementById('histlist');cont.innerHTML='';
  if(!fil.length){cont.innerHTML='<div class="hempty">Aucune séance pour cette période</div>';return;}
  for(var i=0;i<fil.length;i++){
    var entry=fil[i],exH='';
    if(entry.exos)for(var j=0;j<entry.exos.length;j++){
      var ex=entry.exos[j],fs=(ex.sets||[]).filter(function(s){return s.kg||s.reps;});if(!fs.length)continue;
      var sh=fs.map(function(s,si){return'<div class="hset"><span class="hset-n">S'+(si+1)+'</span><span class="hset-v"><span class="kg">'+(s.kg||'—')+' kg</span><span class="x">×</span>'+(s.reps||'—')+(s.done?'<span class="ok">✓</span>':'')+'</span></div>';}).join('');
      exH+='<div class="hex"><div class="hex-name">'+ex.name+'</div>'+sh+(ex.note?'<div class="hnote">"'+ex.note+'"</div>':'')+'</div>';
    }
    if(!exH)continue;
    var bl=document.createElement('div');bl.className='hblock';
    bl.innerHTML='<div class="hblock-date">'+entry.date+' · S'+entry.w.split('-W')[1]+'</div>'+exH;
    cont.appendChild(bl);
  }
}

/* ═══ CHARTS ═══ */
var chartDay=0;
function initCharts(){
  var tabs=document.getElementById('cdtabs');tabs.innerHTML='';
  var p=plan();
  chartDay=p[0].id;
  for(var i=0;i<p.length;i++){(function(d,idx){
    var b=document.createElement('button');b.className='cdtab'+(idx===0?' on':'');
    b.textContent=d.day+' · '+d.label;
    b.onclick=(function(id,btn){return function(){
      chartDay=id;
      document.querySelectorAll('.cdtab').forEach(function(x){x.classList.remove('on');});
      btn.classList.add('on');fillExSel();
    };})(d.id,b);
    tabs.appendChild(b);
  })(p[i],i);}
  fillExSel();
}
function fillExSel(){
  var sel=document.getElementById('chart-sel');
  sel.innerHTML='<option value="">— Choisir un exercice —</option>';
  var p=plan(),d=p.filter(function(x){return x.id===chartDay;})[0],names={};
  for(var i=0;i<d.exos.length;i++)names[d.exos[i].n]=1;
  var h=gH(chartDay);
  for(var i=0;i<h.length;i++)if(h[i].exos)for(var j=0;j<h[i].exos.length;j++)names[h[i].exos[j].name]=1;
  Object.keys(names).forEach(function(n){var o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});
  document.getElementById('chart-content').innerHTML='';
}
function renderChart(){
  var name=document.getElementById('chart-sel').value,wrap=document.getElementById('chart-content');
  wrap.innerHTML='';if(!name)return;
  var h=gH(chartDay),pts=[];
  for(var i=h.length-1;i>=0;i--){
    var e=h[i];if(!e.exos)continue;
    for(var j=0;j<e.exos.length;j++){
      var ex=e.exos[j];if(ex.name!==name)continue;
      var maxKg=0,vol=0;
      (ex.sets||[]).forEach(function(s){var kg=parseFloat(s.kg)||0,rp=parseFloat(s.reps)||0;if(kg>maxKg)maxKg=kg;vol+=kg*rp;});
      if(maxKg>0)pts.push({date:e.date,kg:maxKg,vol:Math.round(vol)});
    }
  }
  if(!pts.length){wrap.innerHTML='<div class="nodata">Aucune donnée pour cet exercice.<br>Fais au moins une séance avec des charges !</div>';return;}
  var maxAll=Math.max.apply(null,pts.map(function(p){return p.kg;}));
  var prog=pts[pts.length-1].kg-pts[0].kg;
  var avgVol=Math.round(pts.reduce(function(a,p){return a+p.vol;},0)/pts.length);
  wrap.innerHTML=
    '<div class="chart-name">'+name+'</div>'+
    '<div class="chart-nsub">'+pts.length+' séance'+(pts.length>1?'s':'')+' enregistrée'+(pts.length>1?'s':'')+'</div>'+
    '<div class="cstats">'+
      '<div class="cstat"><div class="cstat-l">Record</div><div class="cstat-v">'+maxAll+'<span class="cstat-u"> kg</span></div></div>'+
      '<div class="cstat"><div class="cstat-l">Progression</div><div class="cstat-v">'+(prog>=0?'+':'')+prog+'<span class="cstat-u"> kg</span></div></div>'+
      '<div class="cstat"><div class="cstat-l">Vol. moyen</div><div class="cstat-v">'+avgVol+'<span class="cstat-u"></span></div></div>'+
    '</div>'+
    '<div class="chart-box"><canvas id="cvs-kg" height="190"></canvas><div class="chart-leg"><div class="leg-i"><div class="leg-dot" style="background:#c9f23a"></div>Charge max (kg)</div></div></div>'+
    (pts.length>1?'<div class="chart-box"><canvas id="cvs-vol" height="150"></canvas><div class="chart-leg"><div class="leg-i"><div class="leg-dot" style="background:#38bdf8"></div>Volume (kg × reps)</div></div></div>':'');
  drawChart('cvs-kg',pts.map(function(p){return p.date;}),pts.map(function(p){return p.kg;}),'#c9f23a');
  if(pts.length>1)drawChart('cvs-vol',pts.map(function(p){return p.date;}),pts.map(function(p){return p.vol;}),'#38bdf8');
}

function drawChart(id,labels,data,color){
  var cv=document.getElementById(id);if(!cv)return;
  var dpr=window.devicePixelRatio||1,pw=cv.parentElement.clientWidth-20,ph=parseInt(cv.getAttribute('height'))||190;
  cv.width=pw*dpr;cv.height=ph*dpr;cv.style.width=pw+'px';cv.style.height=ph+'px';
  var ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  var pad={t:20,r:16,b:36,l:46},cw=pw-pad.l-pad.r,ch=ph-pad.t-pad.b;
  var mn=Math.min.apply(null,data),mx=Math.max.apply(null,data),rng=(mx-mn)||1;
  var pmn=mn-rng*.12,pmx=mx+rng*.12,prng=pmx-pmn;
  function xp(i){return pad.l+(i/((data.length-1)||1))*cw;}
  function yp(v){return pad.t+ch-((v-pmn)/prng)*ch;}
  // Grid
  ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var gy=pad.t+(i/4)*ch;ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(pad.l+cw,gy);ctx.stroke();ctx.fillStyle='#3a3a3a';ctx.font='10px SF Mono,monospace';ctx.textAlign='right';ctx.fillText(Math.round(pmx-(i/4)*prng),pad.l-5,gy+3);}
  // Fill
  function hex2rgba(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')';}
  var gr=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  gr.addColorStop(0,hex2rgba(color,.22));gr.addColorStop(1,'rgba(13,13,13,0)');
  ctx.beginPath();ctx.moveTo(xp(0),yp(data[0]));
  for(var i=1;i<data.length;i++)ctx.lineTo(xp(i),yp(data[i]));
  ctx.lineTo(xp(data.length-1),pad.t+ch);ctx.lineTo(xp(0),pad.t+ch);ctx.closePath();
  ctx.fillStyle=gr;ctx.fill();
  // Line
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=3;ctx.lineJoin='round';
  for(var i=0;i<data.length;i++){if(i===0)ctx.moveTo(xp(i),yp(data[i]));else ctx.lineTo(xp(i),yp(data[i]));}
  ctx.stroke();
  // Dots
  for(var i=0;i<data.length;i++){
    var x=xp(i),y=yp(data[i]);
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle='#0d0d0d';ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke();
    if(i===data.length-1||data[i]===Math.max.apply(null,data)){ctx.fillStyle=color;ctx.font='bold 11px SF Mono,monospace';ctx.textAlign='center';ctx.fillText(data[i]+(id==='cvs-kg'?'kg':''),x,y-12);}
    var step=Math.ceil(data.length/5);
    if(data.length<=6||(i===0||i===data.length-1||i%step===0)){ctx.fillStyle='#3a3a3a';ctx.font='10px SF Mono,monospace';ctx.textAlign='center';ctx.fillText(labels[i],x,pad.t+ch+22);}
  }
}

/* ═══ NAV ═══ */
function navTo(s){
  document.querySelectorAll('.bnav-btn').forEach(function(b){b.classList.remove('on');});
  document.getElementById('bn-'+s).classList.add('on');
  if(s==='home'){rHome();showPage('p-home');}
  else if(s==='charts'){initCharts();showPage('p-charts');}
}
function goHome(){navTo('home');window.scrollTo(0,0);}
function showPage(id){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById(id).classList.add('active');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2400);}

/* ═══ BOOT ═══ */
loadDB();
rHome();
